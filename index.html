<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>Login - Gestão de Vistoria Inicial</title>
    <script>
      (function() {
        const APP_VERSION = 'v50_photo_fixes';
        if (localStorage.getItem('app_version') !== APP_VERSION) {
          localStorage.setItem('app_version', APP_VERSION);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (let r of regs) r.unregister();
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) caches.delete(name);
            });
          }
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=50" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <p class="eyebrow">Gestão de Vistoria Inicial</p>
        <h1>Acesse o painel</h1>
        <p>Use seu usuário para entrar e gerenciar as vistorias iniciais.</p>

        <form id="loginForm" class="login-form">
          <label>
            Usuário
            <input id="usernameInput" type="text" required placeholder="" />
          </label>
          <label>
            Senha
            <input id="passwordInput" type="password" required placeholder="" />
          </label>
          <button class="primary-btn" type="submit">Entrar</button>
          <p id="loginError" class="login-error" hidden></p>
        </form>

        <form id="registerForm" class="login-form" style="display: none;">
          <label>
            Novo Usuário
            <input id="newUsernameInput" type="text" required placeholder="Digite o usuário" />
          </label>
          <label>
            Nova Senha
            <input id="newPasswordInput" type="password" required placeholder="Digite a senha" />
          </label>
          <button class="primary-btn" type="submit">Cadastrar</button>
          <p id="registerError" class="login-error" hidden></p>
          <p id="registerSuccess" style="color: #10b981; font-size: 0.875rem; text-align: center; margin-top: 10px;" hidden>Cadastro realizado com sucesso! Faça login.</p>
        </form>

        <div class="login-hint" id="toggleLoginView" style="text-align: center; margin-top: 18px;">
          <a href="#" id="showRegisterLink" style="color: #2563eb; font-weight: 600; text-decoration: none;">Novo cadastro</a>
        </div>

        <div style="margin-top: 24px; padding-top: 18px; border-top: 1.5px dashed #e2e8f0; text-align: center;">
          <button id="importBackupButton" class="ghost-btn" style="padding: 10px 14px; font-size: 0.85rem; border: 1px solid #bfdbfe; color: #1d4ed8; background: #eff6ff; font-weight: 700; width: 100%; border-radius: 12px; cursor: pointer;">
            📥 Importar Backup do Sistema (JSON)
          </button>
          <input type="file" id="backupFileInput" accept=".json" style="display: none;" />
        </div>
        <div class="login-hint" id="toggleRegisterView" style="display: none; text-align: center; margin-top: 18px;">
          <a href="#" id="showLoginLink" style="color: #2563eb; font-weight: 600; text-decoration: none;">Entrar</a>
        </div>

      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
