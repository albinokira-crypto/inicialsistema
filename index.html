<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>Gestão de Vistoria Inicial</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">Gestão de Vistoria Inicial</p>
          <h1>Controle de Vistoria Inicial</h1>
          <p>Registre e acompanhe informações de vistorias iniciais com acesso seguro pelo celular ou desktop.</p>
        </div>
        <div class="hero-actions">
          <button id="logoutButton" class="ghost-btn" type="button">Sair</button>
          <button id="clearButton" class="ghost-btn" type="button">Limpar dados</button>
        </div>
      </header>

      <section class="summary-grid" id="summaryGrid"></section>

      <section class="card">
        <h2>Novo registro</h2>
        <form id="itemForm" class="form-grid">
          <label>
            Nome
            <input id="nameInput" name="name" type="text" required placeholder="Ex.: João da Silva" />
          </label>
          <label>
            Categoria
            <input id="categoryInput" name="category" type="text" placeholder="Ex.: Cliente" />
          </label>
          <label class="full-width">
            Observações
            <textarea id="notesInput" name="notes" rows="3" placeholder="Detalhes do cadastro"></textarea>
          </label>
          <div class="form-actions">
            <button class="primary-btn" type="submit">Salvar</button>
            <button id="cancelEditButton" class="ghost-btn" type="button" hidden>Cancelar</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="toolbar">
          <h2>Registros</h2>
          <div class="search-actions">
            <input id="searchInput" type="search" placeholder="Pesquisar por nome ou categoria" />
            <button id="clearSearchButton" class="ghost-btn" type="button" hidden>Limpar</button>
          </div>
        </div>
        <ul id="itemList" class="item-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
