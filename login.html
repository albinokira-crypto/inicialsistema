<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>Login - Gestão de Vistoria Inicial</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <p class="eyebrow">Gestão de Vistoria Inicial</p>
        <h1>Acesse o painel</h1>
        <p>Use seu usuário para entrar e gerenciar as vistorias iniciais.</p>

        <form id="loginForm" class="login-form">
          <label>
            Usuário
            <input id="usernameInput" type="text" required placeholder="admin" />
          </label>
          <label>
            Senha
            <input id="passwordInput" type="password" required placeholder="1234" />
          </label>
          <button class="primary-btn" type="submit">Entrar</button>
          <p id="loginError" class="login-error" hidden></p>
        </form>

        <div class="login-hint">
          Usuário: <strong>admin</strong> | Senha: <strong>1234</strong>
        </div>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
